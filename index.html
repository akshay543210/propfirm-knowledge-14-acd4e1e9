    <!-- Meta Pixel is initialized at runtime by src/components/PixelTracker.tsx if VITE_META_PIXEL_ID is set -->

    <style>
      .initial-loader {
        min-height: 100vh;
        background: radial-gradient(ellipse 80% 50% at 50% 0%, #F8F1E0 0%, #FFFFFF 60%);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Inter', sans-serif;
      }
      .loader-content { text-align: center; color: #0F1115; }
      .loader-spinner {
        width: 64px; height: 64px; margin: 0 auto 24px; position: relative;
      }
      .loader-spinner::before {
        content: ''; position: absolute; inset: 0; border-radius: 50%;
        border: 2px solid rgba(200,169,107,0.18);
      }
      .loader-spinner::after {
        content: ''; position: absolute; inset: 0; border-radius: 50%;
        border: 2px solid transparent; border-top-color: #C8A96B;
        animation: spin 1s linear infinite;
      }
      .loader-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.35rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em;
      }
      .loader-title span {
        background: linear-gradient(135deg, #D6B676, #B88A44);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .loader-text {
        color: #6B6B70; font-size: 0.85rem;
        text-transform: uppercase; letter-spacing: 0.18em;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
